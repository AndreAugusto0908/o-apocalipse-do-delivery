name: Performance Tests

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: k6 scenario to execute
        required: true
        default: load
        type: choice
        options:
          - load
          - stress
          - herd-local
          - gateway-slow
      base_url:
        description: Base URL used by k6
        required: false
        default: http://localhost:3000

jobs:
  performance:
    name: Run selected k6 scenario
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Install dependencies
        run: npm ci

      - name: Start application
        env:
          GATEWAY_LATENCY_MS: ${{ inputs.scenario == 'gateway-slow' && '5000' || '300' }}
          CHECKOUT_TIMEOUT_MS: ${{ inputs.scenario == 'gateway-slow' && '1000' || '2000' }}
          CHECKOUT_MAX_RETRIES: ${{ inputs.scenario == 'gateway-slow' && '1' || '3' }}
          CHECKOUT_RETRY_DELAY_MS: ${{ inputs.scenario == 'gateway-slow' && '100' || '500' }}
        run: |
          npm start > server.log 2>&1 &
          echo $! > server.pid
          sleep 3

      - name: Run k6 scenario
        env:
          BASE_URL: ${{ inputs.base_url }}
        run: |
          case "${{ inputs.scenario }}" in
            load)
              npm run perf:load
              ;;
            stress)
              npm run perf:stress
              ;;
            herd-local)
              npm run perf:herd:local
              ;;
            gateway-slow)
              npm run perf:gateway-slow
              ;;
          esac

      - name: Stop application
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
          fi

      - name: Upload server log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-log-${{ inputs.scenario }}
          path: server.log
