name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Unit and mutation tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit and integration tests
        run: npm test

      - name: Run mutation tests
        run: npm run test:mutation

  validate-performance-scripts:
    name: Validate k6 scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Inspect Black Friday load script
        run: k6 inspect tests/performance/black-friday-load.js

      - name: Inspect Black Friday stress script
        run: k6 inspect tests/performance/black-friday-stress.js

      - name: Inspect Thundering Herd script with reduced VUs
        run: k6 inspect -e HERD_VUS=10 tests/performance/thundering-herd-cache-flush.js

      - name: Inspect slow gateway script
        run: k6 inspect tests/performance/gateway-lento-5000ms.js
